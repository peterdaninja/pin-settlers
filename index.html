* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

body {

  font-family: 'Share Tech Mono', 'Courier New', monospace;

  overscroll-behavior: none;
}

input, select, button, textarea {

}

.app { display: flex; flex-direction: column; min-height: 100vh; }

.header {

}
.header-title {

}
.tab.active { color: var(--yellow); border-bottom-color: var(--yellow); }

.content {

<body>
<div class="app" id="app">
  <div class="header">
    <img src="logo.png" style="width:60px;height:60px;object-fit:contain;margin-bottom:4px;filter:drop-shadow(0 0 8px #f5c84260);border-radius:12px;" alt="Pin Settlers"/>
    <div class="header-title">Pin Settlers</div>
    <div class="header-sub">$5 per game · settle smart</div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

<script>
const COST = 5;

let state = {
  tab: 'session',
  sessionTab: 'setup',
  players: ['','',''],
  games: [],
  result: null,
  sessionName: '',
  error: '',
  expandedHist: null,
  adj: {
    hand: 'right',
    stance: '', target: '', breakpoint: '', entry: '', speed: '',
    stanceTouched: false, targetTouched: false, breakpointTouched: false,
    entryTouched: false, speedTouched: false,
    reaction: '', miss: '', result: null,
  },
};

const inputTimers = {};

/* ── Storage ── */
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('pinSettlers_history') || '[]'); }
  catch { return []; }
}
function saveHistory(h) { localStorage.setItem('pinSettlers_history', JSON.stringify(h)); }
function loadSavedPlayers() {
  try { return JSON.parse(localStorage.getItem('pinSettlers_players') || 'null'); }
  catch { return null; }
}
function savePlayers(p) { localStorage.setItem('pinSettlers_players', JSON.stringify(p)); }

/* ── Settlement math ── */
function computeBalances(players, games) {
  const bal = {};
  players.forEach(p => bal[p] = 0);
  for (const g of games) {
    const winners = g.winners;
    const losers = players.filter(p => !winners.includes(p));
    const pot = losers.length * COST;
    winners.forEach(w => bal[w] += pot / winners.length);
    losers.forEach(l => bal[l] -= COST);
  }
  return bal;
}
function settle(bal) {
  const cred = [], debt = [];
  for (const [n,b] of Object.entries(bal)) {
    if (b > 0.001) cred.push({name:n, amount:b});
    else if (b < -0.001) debt.push({name:n, amount:-b});
  }
  cred.sort((a,b) => b.amount - a.amount);
  debt.sort((a,b) => b.amount - a.amount);
  const txs = [];
  let i=0, j=0;
  while (i<cred.length && j<debt.length) {
    const c=cred[i], d=debt[j], amt=Math.min(c.amount, d.amount);
    txs.push({from:d.name, to:c.name, amount:amt});
    c.amount -= amt; d.amount -= amt;
    if (c.amount < 0.001) i++;
    if (d.amount < 0.001) j++;
  }
  return txs;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
}
function todayISO() { return new Date().toISOString().split('T')[0]; }

/* ══════════════════════════════════════════════
   ADJUSTMENT ENGINE  — v2
   ══════════════════════════════════════════════ */
function computeAdjustment(adj) {
  const hand       = adj.hand;
  const stance     = parseInt(adj.stance);
  const target     = parseInt(adj.target);
  const breakpt    = parseInt(adj.breakpoint);  // board where ball transitions to hook
  const entry      = parseInt(adj.entry);
  const speed      = parseFloat(adj.speed);
  const reaction   = adj.reaction;
  const miss       = adj.miss;

  const POCKET     = 17;   // ideal entry board (both hands, own side)
  const IDEAL_BP_RH = 10;  // ideal breakpoint for RH stroker (board ~8-12 is typical)
  const IDEAL_BP_LH = 10;

  // ── Step 1: Diagnose ball SHAPE (motion problem vs line problem) ──
  // Compare actual breakpoint to ideal. This tells us if the miss is
  // caused by the line itself or by too much / too little motion.
  const idealBP = hand === 'right' ? IDEAL_BP_RH : IDEAL_BP_LH;
  // For RH: breakpoint should be inside (low board #). If BP is too high (outside),
  // ball is hooking early. If BP is too low, ball is skidding.
  // "Early hook": breakpoint is more outside than expected (higher board # for RH)
  // "Late/skid":  breakpoint is more inside than expected (lower board # for RH)
  let bpDelta = 0; // positive = hooking earlier (BP is farther outside than ideal)
  if (hand === 'right') bpDelta = breakpt - idealBP;  // positive = outside = early hook
  else                  bpDelta = idealBP - breakpt;

  // Override reaction with breakpoint data if breakpoint is available
  // bpDelta > 3  → hooking too early regardless of what player selected
  // bpDelta < -3 → skidding too long
  let effectiveReaction = reaction;
  if (bpDelta > 3)  effectiveReaction = 'early';
  if (bpDelta < -3) effectiveReaction = 'late';

  // ── Step 2: Is this primarily a SHAPE problem or a LINE problem? ──
  // If the ball is hooking very early (BP >> ideal), the miss is mostly
  // a motion issue — a big lateral move would just relocate the problem.
  // Flag: shape_dominant = true means the fix is primarily depth/speed, not boards.
  const shapeDominant = Math.abs(bpDelta) > 5 && effectiveReaction !== 'normal';

  // ── Step 3: Size the lateral move from MISS PATTERN only ──
  // Miss pattern is the ground truth — not entry board arithmetic.
  // Sizes are conservative: we'd rather under-adjust and go again.
  //
  //  light miss  (1-3 boards off)   → 1-2 board move
  //  moderate miss (3-5 boards off) → 2-3 board move
  //  strong miss (5+ boards off)    → 3-4 board move
  //  brooklyn                       → 3-5 board move (needs real correction)
  //  corner pin                     → 1-2 board move (usually an angle issue)

  // Estimate actual miss magnitude from entry vs pocket
  // But cap it — we trust the miss label more than the raw number
  const rawErr = hand === 'right' ? Math.abs(entry - POCKET) : Math.abs(POCKET - entry);

  let missBoards = 0;
  let missDir    = '';  // 'left' | 'right' from the bowler's perspective

  // For RH: moving LEFT means lower board numbers (toward 1, right gutter)
  //         moving RIGHT means higher board numbers (toward 39, left side)
  // "Move left" = open up the angle (toward the outside)
  // "Move right" = close the angle (toward the inside)

  switch (miss) {
    case 'brooklyn':
      // Ball crossed nose and went left of headpin for RH
      // Need to move RIGHT (open toward outside) — but not drastically
      missBoards = Math.min(5, Math.max(3, Math.round(rawErr * 0.5)));
      missDir = hand === 'right' ? 'right' : 'left';
      break;
    case 'light-left':
      // High on headpin, slightly left — move RIGHT (open up a touch)
      missBoards = rawErr <= 2 ? 1 : rawErr <= 4 ? 2 : 3;
      missDir = hand === 'right' ? 'right' : 'left';
      break;
    case 'light-right':
      // Thin on headpin, right side — move LEFT (close up a touch)
      missBoards = rawErr <= 2 ? 1 : rawErr <= 4 ? 2 : 3;
      missDir = hand === 'right' ? 'left' : 'right';
      break;
    case 'corner-left':
      // 7-pin (RH) — ball going high and crossing — move RIGHT slightly
      // Often an angle/speed issue more than a line issue
      missBoards = 1;
      missDir = hand === 'right' ? 'right' : 'left';
      break;
    case 'corner-right':
      // 10-pin (RH) — ball coming in flat/thin — move LEFT slightly
      missBoards = 1;
      missDir = hand === 'right' ? 'left' : 'right';
      break;
  }

  // If shape is the dominant problem, cut the lateral move in half —
  // fixing the motion (speed/depth) will move the ball more than moving boards will.
  if (shapeDominant) missBoards = Math.max(1, Math.round(missBoards / 2));

  // ── Step 4: Apply 2-1 rule ──
  // Feet move 2 boards for every 1 board the target moves, SAME direction.
  // This preserves the ball's path angle while shifting the line.
  const feetMove   = missBoards * 2;
  const targetMove = missBoards;

  // New positions (clamp 1–39)
  let newStance = stance, newTarget = target;
  if (missDir === 'left') {
    newStance = Math.max(1, Math.min(39, stance - feetMove));
    newTarget = Math.max(1, Math.min(39, target - targetMove));
  } else if (missDir === 'right') {
    newStance = Math.max(1, Math.min(39, stance + feetMove));
    newTarget = Math.max(1, Math.min(39, target + targetMove));
  }

  // ── Step 5: Shape fix cue ──
  let targetDepthCue = '';
  if (effectiveReaction === 'early' || bpDelta > 3) {
    const bpDesc = bpDelta > 3
      ? `Your breakpoint is on board ${breakpt} — that's farther outside than ideal (board ~${idealBP}), meaning the ball is transitioning too early.`
      : 'The ball is picking up friction and transitioning to hook before the ideal breakpoint.';
    targetDepthCue = `${bpDesc} Move your target 1–2 boards deeper (farther down the lane) to push the breakpoint further in. If the problem persists, a small speed increase (0.5–1 mph) will also help the ball carry through the heads longer.`;
  } else if (effectiveReaction === 'late' || bpDelta < -3) {
    const bpDesc = bpDelta < -3
      ? `Your breakpoint is on board ${breakpt} — that's further inside than ideal (board ~${idealBP}), meaning the ball is skidding too far before transitioning.`
      : 'The ball is skidding through the breakpoint and arriving at the pocket with a flatter angle than ideal.';
    targetDepthCue = `${bpDesc} Move your target 1–2 boards shallower (closer to the foul line) so the ball picks up friction sooner. Slowing down 0.5–1 mph can also help it transition earlier.`;
  }

  // ── Step 6: Speed cue ──
  // Stroker ideal range 15–18 mph. Note if outside, but don't let speed
  // drive a lateral board recommendation — it's a separate fix.
  let speedNote = '', speedCue = '';
  if (speed < 15) {
    speedNote = `Low speed (${speed} mph)`;
    speedCue  = `At ${speed} mph you're below the typical stroker range (15–18 mph). Slow speed amplifies hook and can make the ball drive high through the nose or burn up before the pocket. Focus on a smooth, tension-free swing and let gravity do the work — don't muscle it. Even 1–2 extra mph from a longer backswing will create a more consistent ball motion.`;
  } else if (speed > 18) {
    speedNote = `High speed (${speed} mph)`;
    speedCue  = `At ${speed} mph you're above the typical stroker range (15–18 mph). The ball may be skidding too long, arriving flat, and deflecting through the pins without carrying. Try a slightly shorter backswing or slower approach tempo — you want the ball rolling before it hits the pins.`;
  }

  // ── Step 7: Entry angle note ──
  // Angle = how many boards the ball crossed from target to entry.
  // For a stroker, ~6–10 boards of crossing (target to entry) is healthy.
  let angleCue = '';
  const crossing = hand === 'right' ? (entry - target) : (target - entry);
  // crossing > 0 means the ball hooked (moved toward pocket from target) — normal
  // crossing < 0 means the ball went away from pocket — unusual
  if (crossing < 3) {
    angleCue = `The ball crossed only ${crossing} boards from your target to entry — that's a very flat angle. Ideal stroker entry is 3–6° which typically means 6–10 boards of crossing. Consider moving your feet 2–3 boards toward the outside (keeping your target) to create more board differential and a stronger entry angle.`;
  } else if (crossing > 14) {
    angleCue = `The ball crossed ${crossing} boards from target to entry — that's a steep angle. Too much crossing can cause high flush hits or leave corner pins. Consider closing your angle slightly by moving your feet a few boards toward the inside while keeping your target.`;
  }

  // ── Step 8: Severity ──
  let severity = 'minor';
  if (miss === 'brooklyn' || feetMove >= 6) severity = 'major';
  else if (feetMove >= 4 || shapeDominant) severity = 'moderate';

  const dirLabel = missDir === 'left' ? '← Left' : missDir === 'right' ? '→ Right' : '—';

  return {
    severity, feetMove, targetMove, missDir, dirLabel,
    newStance, newTarget,
    targetDepthCue, speedNote, speedCue, angleCue,
    effectiveReaction, bpDelta, shapeDominant, crossing,
    miss, hand, stance, target, breakpt, entry, speed,
  };
}

/* ── Render ── */
function render() { renderTabs(); renderContent(); }

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const items = [
    {id:'session', icon:'🎳', label:'Session'},
    {id:'adjust',  icon:'🎯', label:'Adjust'},
    {id:'history', icon:'📋', label:'History'},
  ];
  tabs.innerHTML = items.map(t => `
    <button class="tab ${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">
      <span class="tab-icon">${t.icon}</span>${t.label}
    </button>
  `).join('');
}

function renderContent() {
  const el = document.getElementById('content');
  if (state.tab === 'session') el.innerHTML = renderSession();
  else if (state.tab === 'adjust') el.innerHTML = renderAdjust();
  else el.innerHTML = renderHistory();
  bindEvents();
}

/* ── Session tab ── */
function renderSession() {
  const inner = state.sessionTab === 'setup'   ? renderSetup()
              : state.sessionTab === 'games'   ? renderGames()
              : renderResults();
  const subtabs = [
    {id:'setup',   icon:'👤', label:'Players'},
    {id:'games',   icon:'🎳', label:`Games${state.games.length?` (${state.games.length})`:''}`},
    {id:'results', icon:'💰', label:'Results'},
  ].map(t => `
    <button class="tab ${state.sessionTab===t.id?'active':''}" style="flex:1;font-size:0.58rem;"
      onclick="switchSessionTab('${t.id}')">
      <span class="tab-icon">${t.icon}</span>${t.label}
    </button>
  `).join('');
  return `
    <div style="display:flex;border-bottom:1px solid #2a2a4a;margin:-20px -16px 20px;background:#0d0d1a;">
      ${subtabs}
    </div>
    ${inner}
  `;
}

function renderSetup() {
  const rows = state.players.map((p,i) => `
    <div class="player-row">
      <input class="field" id="player-input-${i}" placeholder="Player ${i+1}" value="${esc(p)}"
        oninput="bufferPlayer(${i}, this.value)"
        autocapitalize="words" autocorrect="off" autocomplete="off" spellcheck="false"/>
      ${state.players.length > 2 ? `<button class="btn-sm" onclick="delPlayer(${i})">✕</button>` : ''}
    </div>
  `).join('');
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  return `
    <div class="sec-title">⚡ Players</div>
    ${rows}
    ${state.players.length < 4 ? `<button class="btn gap" onclick="addPlayer()">+ Add Player</button>` : ''}
    ${active.length >= 2 ? `
      <div style="margin-top:20px;">
        <button class="btn btn-primary" onclick="switchSessionTab('games')">Next → Add Games</button>
      </div>` : ''}
  `;
}

function renderGames() {
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  const gameCards = state.games.map((g,gi) => `
    <div class="card">
      <div class="card-head">
        <span class="card-label">Game ${gi+1}</span>
        <button class="btn btn-danger" onclick="delGame(${gi})">Remove</button>
      </div>
      <div class="card-body">
        <div style="font-size:0.6rem;color:#5050a0;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;">Tap winner(s)</div>
        ${active.map(p => {
          const isWinner = g.winners.includes(p);
          return `
            <button onclick="toggleWinner(${gi},'${esc(p)}')" style="
              display:flex;align-items:center;gap:10px;width:100%;
              background:${isWinner ? '#1a3a1a' : 'transparent'};
              border:1.5px solid ${isWinner ? 'var(--green)' : 'var(--border)'};
              border-radius:10px;padding:12px 14px;margin-bottom:8px;
              color:${isWinner ? 'var(--green)' : '#a0a0d0'};
              font-family:inherit;font-size:0.9rem;cursor:pointer;text-align:left;
            ">
              <span style="font-size:1.1rem;">${isWinner ? '🥇' : '○'}</span>
              <span>${esc(p)}</span>
              ${isWinner ? '<span style="margin-left:auto;font-size:0.65rem;letter-spacing:0.15em;">WINNER</span>' : ''}
            </button>
          `;
        }).join('')}
      </div>
      <div class="card-hint">Tap multiple players for a tie</div>
    </div>
  `).join('');
  return `
    <div class="sec-title">🎳 Game Results</div>
    ${gameCards}
    ${active.length >= 2
      ? `<button class="btn btn-ghost gap-lg" onclick="addGame()">+ Add Game</button>`
      : `<div class="empty">Go to Players tab first</div>`}
    ${state.games.length > 0 ? `
      <button class="btn btn-primary" onclick="calculate()">🎳 Settle Up</button>
      ${state.error ? `<div class="error">⚠ ${esc(state.error)}</div>` : ''}
    ` : ''}
  `;
}

function renderResults() {
  if (!state.result) return `<div class="empty">No results yet.<br/>Add games and tap<br/>🎳 <strong>Settle Up</strong></div>`;
  const {bal, txs} = state.result;
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  const balRows = active.map(n => {
    const b = bal[n] || 0;
    return `<div class="bal-row"><span>${esc(n)}</span><span class="${b>=0?'pos':'neg'}">${b>=0?'+':''}$${b.toFixed(2)}</span></div>`;
  }).join('');
  const txCards = txs.length === 0
    ? `<div class="all-clear">Everyone is square! 🎉</div>`
    : txs.map(tx => `
        <div class="tx-card">
          <span class="tx-from">${esc(tx.from)}</span>
          <span class="tx-arrow">→</span>
          <span class="tx-to">${esc(tx.to)}</span>
          <span class="tx-amt">$${tx.amount.toFixed(2)}</span>
        </div>
      `).join('');
  return `
    <div class="rename-row">
      <input class="field" id="sessionNameInput" placeholder="e.g. Friday Night Bowling"
        value="${esc(state.sessionName)}"
        oninput="bufferSessionName(this.value)"
        autocorrect="off" autocomplete="off" spellcheck="false"/>
      <button class="rename-btn" onclick="saveSession()">💾 Save</button>
    </div>
    <div id="saveError" class="error" style="display:none;margin-bottom:10px;"></div>
    <div class="sec-title" style="color:#f5c842;">💰 Net Balances · ${state.games.length} Game${state.games.length!==1?'s':''}</div>
    ${balRows}
    <div class="green-title" style="margin-top:20px;">✅ Pay Up · ${txs.length} Transaction${txs.length!==1?'s':''}</div>
    ${txCards}
    <div style="margin-top:24px;">
      <button class="btn btn-subtle" onclick="newSession()">🔄 New Session</button>
    </div>
  `;
}

    <span class="field-label">Consistent miss pattern</span>
    <div class="chip-row">
      ${missOptions.map(m => `
        <button class="chip ${a.miss===m.id ? 'active-yellow':''}"
          onclick="adjSet('miss','${m.id}')"
          title="${m.desc}">${m.label}</button>
      `).join('')}
    </div>
    ${a.miss ? `<div style="font-size:0.62rem;color:#4a4a8a;margin-top:-2px;margin-bottom:8px;">${missOptions.find(m=>m.id===a.miss)?.desc||''}</div>` : ''}

    <div style="margin-top:20px;" class="gap-lg">
      ${canCalc
        ? `<button id="calc-btn" class="btn btn-blue" onclick="runAdjustment()">🎯 Calculate Adjustment</button>`
        : `<button id="calc-btn" class="btn btn-blue" style="opacity:0.4;pointer-events:none;">Fill in all fields above</button>`
      }
    </div>

    ${resultHtml}

    <div style="margin-top:16px;">
      <button class="btn btn-subtle" onclick="resetAdj()">↺ Reset Form</button>
    </div>
  `;
}

function renderAdjResult(r) {
  const sevClass = r.severity === 'major' ? 'sev-major' : r.severity === 'moderate' ? 'sev-moderate' : 'sev-minor';
  const sevLabel = r.severity === 'major' ? 'Major adj' : r.severity === 'moderate' ? 'Moderate' : 'Minor adj';

  const noMove = r.feetMove === 0;

  // Lane visualization SVG
  // Simplified top-down lane showing boards, old line, new line
  const laneViz = buildLaneViz(r);

  return `
    <div class="adj-result">
      <div class="adj-result-head">
        <span style="font-size:1.4rem;">🎯</span>
        <span class="adj-result-title">Your Adjustment</span>
        <span class="adj-severity ${sevClass}">${sevLabel}</span>
      </div>

      ${laneViz}

      <div class="adj-block">
        <div class="adj-block-label">Feet (stance)</div>
        ${noMove ? `<div class="adj-move-detail">No lateral stance change needed</div>` : `
          <div class="adj-line">
            <span class="adj-move">${r.dirLabel}</span>
            <span class="adj-move-detail">${r.feetMove} boards → board ${r.newStance}</span>
          </div>
        `}
        <div class="adj-why">Move from board ${r.stance} to board ${r.newStance}. Your feet set the launch angle — moving them ${r.missDir} shifts your entire ball path in that direction.</div>
      </div>

      <div class="adj-block">
        <div class="adj-block-label">Target (arrows)</div>
        ${noMove ? `<div class="adj-move-detail">No target change needed</div>` : `
          <div class="adj-line">
            <span class="adj-move">${r.dirLabel}</span>
            <span class="adj-move-detail">${r.targetMove} board${r.targetMove!==1?'s':''} → board ${r.newTarget}</span>
          </div>
        `}
        <div class="adj-why">Move your target from board ${r.target} to board ${r.newTarget}. Using the 2-1 rule: feet move 2× what the target moves, both in the same direction as your miss.</div>
      </div>

      ${r.targetDepthCue ? `
        <div class="adj-block">
          <div class="adj-block-label">Ball shape fix</div>
          <div class="adj-cue">${r.targetDepthCue}</div>
        </div>
      ` : ''}

      ${r.speedCue ? `
        <div class="adj-block">
          <div class="adj-block-label">Speed note · ${esc(r.speedNote)}</div>
          <div class="adj-warn">${r.speedCue}</div>
        </div>
      ` : ''}

      ${r.angleCue ? `
        <div class="adj-block">
          <div class="adj-block-label">Entry angle</div>
          <div class="adj-cue">${r.angleCue}</div>
        </div>
      ` : ''}

      <div class="adj-block">
        <div class="adj-block-label">Summary</div>
        <div class="adj-cue" style="font-size:0.82rem;line-height:1.7;">
          ${buildSummary(r)}
        </div>
      </div>
    </div>
  `;
}

function buildSummary(r) {
  const hand = r.hand === 'right' ? 'right-handed' : 'left-handed';
  const pocket = 17;
  const diff = r.hand === 'right' ? (r.entry - pocket) : (pocket - r.entry);
  const diffDesc = diff === 0 ? 'hitting the pocket' :
    diff > 0 ? `${diff} board${diff!==1?'s':''} light` :
               `${Math.abs(diff)} board${Math.abs(diff)!==1?'s':''} high`;
  const missMap = {
    brooklyn: 'going Brooklyn',
    'light-left': 'hitting light on the left',
    'light-right': 'hitting light on the right',
    'corner-left': 'leaving the left corner pin',
    'corner-right': 'leaving the right corner pin',
  };
  const bpNote = r.bpDelta > 3 ? ` The breakpoint (board ${r.breakpt}) is earlier than ideal — ball is over-hooking.`
               : r.bpDelta < -3 ? ` The breakpoint (board ${r.breakpt}) is later than ideal — ball is skidding through.`
               : ` Breakpoint on board ${r.breakpt} looks reasonable.`;
  const noMove = r.feetMove === 0;
  const moveDesc = noMove
    ? 'No lateral move needed — focus on the ball motion fix above.'
    : `Move your feet ${r.feetMove} boards ${r.missDir} to board ${r.newStance} and your target ${r.targetMove} board${r.targetMove!==1?'s':''} ${r.missDir} to board ${r.newTarget}.`;
  return `You're ${hand}, standing on board ${r.stance}, targeting board ${r.target} at the arrows. The ball is breaking on board ${r.breakpt} and entering at board ${r.entry} — ${diffDesc}. You're consistently ${missMap[r.miss]||'missing'}.${bpNote} ${moveDesc}`;
}

function buildLaneViz(r) {
  // Vertical lane: foul line at top, pins at bottom
  // Lane occupies center column; board labels on left; legend on right
  // SVG viewBox: 260 wide x 520 tall
  const SVG_W = 260, SVG_H = 520;
  const LANE_X = 60;    // left edge of lane
  const LANE_W = 120;   // lane width in SVG units (39 boards across)
  const FL_Y   = 30;    // foul line y
  const ARR_Y  = 165;   // arrows (15 ft mark) y
  const DOT_Y  = 100;   // rangefinder dots (7 ft) y
  const PIN_Y  = 440;   // pin deck y
  const LANE_RIGHT = LANE_X + LANE_W;

  // board → x: board 1 = right side (for RH), board 39 = left side
  // For LH we mirror: board 1 = left side
  function bx(b) {
    const clamped = Math.max(1, Math.min(39, b));
    if (r.hand === 'right') {
      return LANE_X + (39 - clamped) / 38 * LANE_W;
    } else {
      return LANE_X + (clamped - 1) / 38 * LANE_W;
    }
  }

  // Key x positions
  const oldStanceX  = bx(r.stance);
  const oldTargetX  = bx(r.target);
  const oldEntryX   = bx(r.entry);
  const newStanceX  = bx(r.newStance);
  const newTargetX  = bx(r.newTarget);
  const pocketX     = bx(17);

  // Arrow board marks (boards 5,10,15,20,25,30,35)
  const arrowBoards = [5,10,15,20,25,30,35];

  // Board lines at arrow positions
  const boardLines = arrowBoards.map(b => {
    const x = bx(b);
    return `<line x1="${x}" y1="${FL_Y}" x2="${x}" y2="${PIN_Y}" stroke="#1a2a10" stroke-width="0.5" opacity="0.8"/>`;
  }).join('');

  // Arrow markers (chevron shapes at ARR_Y)
  const arrowMarkers = arrowBoards.map(b => {
    const x = bx(b);
    return `<polygon points="${x},${ARR_Y - 6} ${x-4},${ARR_Y + 2} ${x+4},${ARR_Y + 2}" fill="#1e3a1e" stroke="#2a5a2a" stroke-width="0.5"/>`;
  }).join('');

  // Rangefinder dots at DOT_Y (boards 3,5,8,11,14 and mirrors)
  const dotBoards = r.hand === 'right'
    ? [3,5,8,11,14,26,29,32,35,37]
    : [3,5,8,11,14,26,29,32,35,37];
  const dotMarkers = dotBoards.map(b => {
    const x = bx(b);
    return `<circle cx="${x}" cy="${DOT_Y}" r="2" fill="#1e3a1e" stroke="#2a5a2a" stroke-width="0.5"/>`;
  }).join('');

  // Board number labels on left side at arrow positions
  const boardLabels = arrowBoards.map(b => {
    const x = bx(b);
    const labelX = LANE_X - 6;
    return `<text x="${labelX}" y="${ARR_Y + 1}" text-anchor="end" fill="#2a5a2a" font-size="8" font-family="monospace" dominant-baseline="middle"
      transform="translate(0,0)" style="display:none"></text>`;
  }).join('');

  // Pocket marker line
  const pocketLine = `<line x1="${pocketX}" y1="${ARR_Y}" x2="${pocketX}" y2="${PIN_Y}" stroke="#f5c84220" stroke-width="1" stroke-dasharray="2 4"/>`;

  // Breakpoint marker — horizontal dashed line at the BP y position + circle on the old path
  // BP is typically between arrows and pin deck — map it proportionally
  // We'll place it between ARR_Y and PIN_Y based on board position (visual only — vertical position
  // approximates ~40 ft out, which is ~60% of lane length from foul line)
  const BP_Y = ARR_Y + (PIN_Y - ARR_Y) * 0.45;
  const bpX  = bx(r.breakpt);
  const bpLine = `
    <line x1="${LANE_X}" y1="${BP_Y.toFixed(1)}" x2="${LANE_RIGHT}" y2="${BP_Y.toFixed(1)}"
      stroke="#4ab8f025" stroke-width="0.8" stroke-dasharray="3 4"/>
    <text x="${LANE_RIGHT + 6}" y="${BP_Y.toFixed(1)}" dominant-baseline="middle"
      fill="#2a4a5a" font-size="7" font-family="monospace" text-anchor="start">BP</text>
    <circle cx="${bpX.toFixed(1)}" cy="${BP_Y.toFixed(1)}" r="4"
      fill="none" stroke="#4ab8f0" stroke-width="1.2" opacity="0.7"/>
    <circle cx="${bpX.toFixed(1)}" cy="${BP_Y.toFixed(1)}" r="1.5"
      fill="#4ab8f0" opacity="0.7"/>`;

  // ── Pin layout (7-10 pin deck) ──
  // Standard pin positions relative to center of pin deck
  // Row 1 (front): pin 1 (headpin) — center
  // Row 2: pins 2, 3
  // Row 3: pins 4, 5, 6
  // Row 4: pins 7, 8, 9, 10
  // Each row is 18px apart vertically, pins in a row are 16px apart
  const PIN_CX = LANE_X + LANE_W / 2;
  const PR = 5; // pin circle radius
  const ROW_GAP = 18;
  const COL_GAP = 14;

  function pinPos(row, col, totalInRow) {
    const rowY = PIN_Y + row * ROW_GAP;
    const startX = PIN_CX - ((totalInRow - 1) * COL_GAP) / 2;
    return { x: startX + col * COL_GAP, y: rowY };
  }

  const pins = [
    pinPos(0, 0, 1),  // 1 headpin
    pinPos(1, 0, 2), pinPos(1, 1, 2),  // 2, 3
    pinPos(2, 0, 3), pinPos(2, 1, 3), pinPos(2, 2, 3),  // 4, 5, 6
    pinPos(3, 0, 4), pinPos(3, 1, 4), pinPos(3, 2, 4), pinPos(3, 3, 4),  // 7, 8, 9, 10
  ];

  const pinSVG = pins.map((p, i) => {
    const isHeadpin = i === 0;
    const isPocket = (r.hand === 'right') ? (i === 0 || i === 2) : (i === 0 || i === 1); // 1-3 pocket for RH
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${PR}"
      fill="${isHeadpin ? '#2a3a2a' : '#1e2e1e'}"
      stroke="${isPocket ? '#4a7a4a' : '#2a4a2a'}"
      stroke-width="${isHeadpin ? '1' : '0.8'}"/>`;
  }).join('');

  // ── Ball path lines ──
  // Old path: stance → target (at arrows) → entry (at pins)
  // New path: newStance → newTarget → pocket
  const oldPath = `
    <line x1="${oldStanceX.toFixed(1)}" y1="${FL_Y}"
          x2="${oldTargetX.toFixed(1)}" y2="${ARR_Y}"
          stroke="#e05c2a" stroke-width="2" stroke-dasharray="5 3" opacity="0.75"/>
    <line x1="${oldTargetX.toFixed(1)}" y1="${ARR_Y}"
          x2="${bpX.toFixed(1)}"        y2="${BP_Y.toFixed(1)}"
          stroke="#e05c2a" stroke-width="2" stroke-dasharray="5 3" opacity="0.75"/>
    <line x1="${bpX.toFixed(1)}"        y1="${BP_Y.toFixed(1)}"
          x2="${oldEntryX.toFixed(1)}"  y2="${PIN_Y}"
          stroke="#e05c2a" stroke-width="2.5" stroke-dasharray="5 3" opacity="0.85"/>`;

  const idealBPX = bx(r.hand === 'right' ? 10 : 10);
  const newPath = `
    <line x1="${newStanceX.toFixed(1)}" y1="${FL_Y}"
          x2="${newTargetX.toFixed(1)}" y2="${ARR_Y}"
          stroke="#4af04a" stroke-width="2" opacity="0.9"/>
    <line x1="${newTargetX.toFixed(1)}" y1="${ARR_Y}"
          x2="${idealBPX.toFixed(1)}"   y2="${BP_Y.toFixed(1)}"
          stroke="#4af04a" stroke-width="2" opacity="0.9"/>
    <line x1="${idealBPX.toFixed(1)}"   y1="${BP_Y.toFixed(1)}"
          x2="${pocketX.toFixed(1)}"    y2="${PIN_Y}"
          stroke="#4af04a" stroke-width="2.5" opacity="0.9"/>`;

  // ── Stance dots at foul line ──
  const stanceDots = `
    <circle cx="${oldStanceX.toFixed(1)}" cy="${FL_Y}" r="4" fill="#e05c2a" opacity="0.8"/>
    <circle cx="${newStanceX.toFixed(1)}" cy="${FL_Y}" r="4" fill="#4af04a" opacity="0.95"/>`;

  // ── Target diamonds at arrows ──
  function diamond(cx, cy, size, fill, opacity) {
    return `<polygon points="${cx},${cy-size} ${cx+size},${cy} ${cx},${cy+size} ${cx-size},${cy}"
      fill="${fill}" opacity="${opacity}"/>`;
  }
  const targetMarkers = diamond(oldTargetX, ARR_Y, 5, '#e05c2a', '0.8') +
                        diamond(newTargetX, ARR_Y, 5, '#4af04a', '0.95');

  // ── Entry dots at pin deck ──
  const entryDots = `
    <circle cx="${oldEntryX.toFixed(1)}" cy="${PIN_Y}" r="4" fill="#e05c2a" opacity="0.85"/>
    <circle cx="${pocketX.toFixed(1)}"   cy="${PIN_Y}" r="4" fill="#4af04a" opacity="0.95"/>`;

  // ── Board labels along left edge of lane at arrow level ──
  const sideLabelY = ARR_Y;
  const arrowBoardLabels = arrowBoards.map(b => {
    const x = bx(b);
    return `<text x="${x}" y="${ARR_Y + 14}" text-anchor="middle"
      fill="#2a5a2a" font-size="7" font-family="monospace">${b}</text>`;
  }).join('');

  // ── Zone labels (right side of lane) ──
  const zoneLabels = `
    <text x="${LANE_RIGHT + 6}" y="${FL_Y + 1}" dominant-baseline="middle"
      fill="#3a3a6a" font-size="8" font-family="monospace" text-anchor="start">FL</text>
    <text x="${LANE_RIGHT + 6}" y="${DOT_Y}" dominant-baseline="middle"
      fill="#2a4a2a" font-size="7" font-family="monospace" text-anchor="start">dots</text>
    <text x="${LANE_RIGHT + 6}" y="${ARR_Y}" dominant-baseline="middle"
      fill="#2a5a2a" font-size="8" font-family="monospace" text-anchor="start">arrows</text>
    <text x="${LANE_RIGHT + 6}" y="${PIN_Y}" dominant-baseline="middle"
      fill="#2a5a2a" font-size="8" font-family="monospace" text-anchor="start">pins</text>`;

  // ── Board callouts (entry board numbers below entry dots) ──
  const entryCalls = `
    <text x="${oldEntryX.toFixed(1)}" y="${PIN_Y - 10}" text-anchor="middle"
      fill="#e05c2a" font-size="8" font-family="monospace">${r.entry}</text>
    <text x="${pocketX.toFixed(1)}" y="${PIN_Y - 10}" text-anchor="middle"
      fill="#4af04a" font-size="8" font-family="monospace">17</text>`;

  // ── Stance board callouts at foul line ──
  const stanceCalls = `
    <text x="${oldStanceX.toFixed(1)}" y="${FL_Y - 8}" text-anchor="middle"
      fill="#e05c2a" font-size="8" font-family="monospace">${r.stance}</text>
    <text x="${newStanceX.toFixed(1)}" y="${FL_Y - 8}" text-anchor="middle"
      fill="#4af04a" font-size="8" font-family="monospace">${r.newStance}</text>`;

  // ── Legend ──
  const LX = 8, LY = FL_Y;
  const legend = `
    <line x1="${LX}" y1="${LY}" x2="${LX+18}" y2="${LY}" stroke="#e05c2a" stroke-width="2" stroke-dasharray="4 2" opacity="0.8"/>
    <text x="${LX}" y="${LY + 12}" fill="#e05c2a" font-size="7" font-family="monospace">current</text>
    <line x1="${LX}" y1="${LY + 24}" x2="${LX+18}" y2="${LY + 24}" stroke="#4af04a" stroke-width="2" opacity="0.9"/>
    <text x="${LX}" y="${LY + 36}" fill="#4af04a" font-size="7" font-family="monospace">adjusted</text>`;

  return `
    <div class="lane-viz">
      <div class="lane-viz-label">🎳 lane view · foul line → pins</div>
      <div class="lane-svg-wrap" style="display:flex;justify-content:center;">
        <svg width="220" viewBox="0 0 ${SVG_W} ${SVG_H}" style="display:block;">

          <!-- Lane surface -->
          <rect x="${LANE_X}" y="${FL_Y}" width="${LANE_W}" height="${PIN_Y - FL_Y + 80}"
            fill="#0a120a" rx="2"/>

          <!-- Gutter strips -->
          <rect x="${LANE_X - 8}" y="${FL_Y}" width="8" height="${PIN_Y - FL_Y + 80}" fill="#080f08" rx="1"/>
          <rect x="${LANE_RIGHT}"  y="${FL_Y}" width="8" height="${PIN_Y - FL_Y + 80}" fill="#080f08" rx="1"/>

          <!-- Board lines at arrow positions -->
          ${boardLines}

          <!-- Pocket line (subtle) -->
          ${pocketLine}

          <!-- Breakpoint marker -->
          ${bpLine}

          <!-- Rangefinder dots -->
          ${dotMarkers}

          <!-- Foul line -->
          <line x1="${LANE_X - 8}" y1="${FL_Y}" x2="${LANE_RIGHT + 8}" y2="${FL_Y}"
            stroke="#3a3a7a" stroke-width="1.5"/>

          <!-- Arrow markers -->
          ${arrowMarkers}

          <!-- Arrow board number labels -->
          ${arrowBoardLabels}

          <!-- Ball paths -->
          ${oldPath}
          ${newPath}

          <!-- Stance dots -->
          ${stanceDots}

          <!-- Target diamonds -->
          ${targetMarkers}

          <!-- Entry dots -->
          ${entryDots}

          <!-- Pin layout -->
          ${pinSVG}

          <!-- Board callouts -->
          ${stanceCalls}
          ${entryCalls}

          <!-- Zone labels -->
          ${zoneLabels}

          <!-- Legend -->
          ${legend}

        </svg>
      </div>
    </div>
  `;
}

/* ── History tab ── */
function renderHistory() {
  const history = loadHistory();
  if (history.length === 0) return `<div class="empty">No saved sessions yet.<br/>Complete a game, name it,<br/>and tap 💾 Save.</div>`;
  return `
    <div class="sec-title">📋 Past Sessions <span style="color:#3a3a7a;font-size:0.6em;letter-spacing:0.1em;">· last 30 days</span></div>
    ${history.slice().reverse().map((s,ri) => {
      const i = history.length - 1 - ri;
      const expanded = state.expandedHist === i;
      const txCount = s.txs.length;
      const label = s.name || formatDate(s.date);
      const detail = expanded ? `
        <div class="hist-body">
          <div style="font-size:0.65rem;color:#5050a0;letter-spacing:0.1em;margin-bottom:10px;">${formatDate(s.date)}</div>
          <div style="font-size:0.65rem;color:#6060a0;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:8px;">Balances</div>
          ${Object.entries(s.bal).map(([n,b])=>`
            <div class="bal-row" style="font-size:0.85rem;">
              <span>${esc(n)}</span>
              <span class="${b>=0?'pos':'neg'}">${b>=0?'+':''}$${b.toFixed(2)}</span>
            </div>
          `).join('')}
          <div style="font-size:0.65rem;color:#6060a0;letter-spacing:0.2em;text-transform:uppercase;margin:14px 0 8px;">Transactions</div>
          ${s.txs.length === 0
            ? `<div style="color:#4af04a;font-size:0.85rem;padding:8px 0;">Everyone was square 🎉</div>`
            : s.txs.map(tx=>`
                <div class="tx-card" style="font-size:0.85rem;padding:10px 14px;">
                  <span class="tx-from">${esc(tx.from)}</span>
                  <span class="tx-arrow" style="font-size:1rem;">→</span>
                  <span class="tx-to">${esc(tx.to)}</span>
                  <span class="tx-amt" style="font-size:0.95rem;">$${tx.amount.toFixed(2)}</span>
                </div>
              `).join('')}
          <div style="margin-top:14px;">
            <button class="btn btn-danger" style="width:100%;padding:10px;" onclick="deleteSession(${i},event)">🗑 Delete This Session</button>
          </div>
        </div>
      ` : '';
      return `
        <div class="hist-card" onclick="toggleHist(${i})">
          <div class="hist-head">
            <div>
              <div class="hist-date">${esc(label)}</div>
              <div class="hist-meta">${s.games} game${s.games!==1?'s':''} · ${s.players.join(', ')}</div>
            </div>
            <div class="hist-right">
              <div style="text-align:right;">
                <div style="font-size:0.7rem;color:#5050a0;">${txCount} tx</div>
              </div>
              <span class="hist-chevron ${expanded?'open':''}">▶</span>
            </div>
          </div>
          ${detail}
        </div>
      `;
    }).join('')}
  `;
}

/* ── Adjust actions ── */
function adjSlider(key, val) {
  const v = parseFloat(val);
  state.adj[key] = v;
  state.adj[key + 'Touched'] = true;
  state.adj.result = null;
  // Live-update label and fill bar without full re-render
  const lbl = document.getElementById('lbl-' + key);
  const fill = document.getElementById('fill-' + key);
  if (lbl) {
    lbl.textContent = key === 'speed' ? v + ' mph' : v;
    lbl.classList.remove('unset');
  }
  if (fill) {
    const pct = key === 'speed'
      ? ((v - 8) / 17 * 100).toFixed(1)
      : ((v - 1) / 38 * 100).toFixed(1);
    fill.style.width = pct + '%';
  }
  // Check if we can now enable the button (no re-render needed for sliders)
  updateCalcBtn();
}
function updateCalcBtn() {
  const a = state.adj;
  const can = a.stanceTouched && a.targetTouched && a.breakpointTouched && a.entryTouched && a.speedTouched && a.reaction && a.miss;
  const btn = document.getElementById('calc-btn');
  if (btn) {
    btn.style.opacity = can ? '1' : '0.4';
    btn.style.pointerEvents = can ? 'auto' : 'none';
  }
}
function adjSet(key, val) {
  state.adj[key] = val;
  state.adj.result = null;
  render();
  // After render, re-check button state
  setTimeout(updateCalcBtn, 0);
}
function adjSetVal(key, val) {
  state.adj[key] = val;
  state.adj.result = null;
  // Debounce re-render for number inputs
  clearTimeout(inputTimers['adj_' + key]);
  inputTimers['adj_' + key] = setTimeout(() => { render(); }, 400);
}
function runAdjustment() {
  const a = state.adj;
  if (!a.stance || !a.target || !a.entry || !a.speed || !a.reaction || !a.miss) return;
  state.adj.result = computeAdjustment(a);
  render();
  // Scroll to result
  setTimeout(() => {
    const el = document.querySelector('.adj-result');
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 100);
}
function resetAdj() {
  state.adj = { hand: state.adj.hand, stance:'', target:'', breakpoint:'', entry:'', speed:'',
    stanceTouched:false, targetTouched:false, breakpointTouched:false, entryTouched:false, speedTouched:false,
    reaction:'', miss:'', result:null };
  render();
}

/* ── Session actions ── */
function bufferPlayer(i, val) {
  state.players[i] = val;
  clearTimeout(inputTimers['player_' + i]);
  inputTimers['player_' + i] = setTimeout(() => {
    state.result = null;
    render();
    const el = document.getElementById('player-input-' + i);
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 600);
}
function bufferSessionName(val) { state.sessionName = val; }

function switchTab(t) { state.tab = t; state.expandedHist = null; render(); }
function switchSessionTab(t) {
  Object.keys(inputTimers).forEach(k => { clearTimeout(inputTimers[k]); delete inputTimers[k]; });
  state.sessionTab = t;
  render();
}

function addPlayer() {
  if (state.players.length < 4) {
    state.players.push('');
    render();
    setTimeout(() => {
      const el = document.getElementById('player-input-' + (state.players.length - 1));
      if (el) el.focus();
    }, 50);
  }
}
function delPlayer(i) {
  if (state.players.length <= 2) return;
  state.players.splice(i,1); state.games=[]; state.result=null; render();
}
function addGame() {
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  if (active.length < 2) return;
  state.games.push({ winners: [] }); state.result = null; render();
}
function toggleWinner(gi, player) {
  const w = state.games[gi].winners;
  const idx = w.indexOf(player);
  if (idx === -1) w.push(player); else w.splice(idx, 1);
  state.result = null; render();
}
function delGame(i) { state.games.splice(i,1); state.result=null; render(); }

function calculate() {
  state.error = '';
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  if (active.length < 2) { state.error = 'Enter at least 2 player names.'; render(); return; }
  if (state.games.length === 0) { state.error = 'Add at least one game.'; render(); return; }
  for (let i = 0; i < state.games.length; i++) {
    if (state.games[i].winners.length === 0) { state.error = `Game ${i+1} needs at least one winner.`; render(); return; }
    if (state.games[i].winners.length === active.length) { state.error = `Game ${i+1}: everyone can't win.`; render(); return; }
  }
  savePlayers(active);
  const bal = computeBalances(active, state.games);
  state.result = {bal, txs: settle(bal)};
  state.sessionTab = 'results';
  render();
}

function saveSession() {
  if (!state.result) return;
  const input = document.getElementById('sessionNameInput');
  if (input) state.sessionName = input.value;
  const name = state.sessionName.trim();
  if (!name) {
    if (input) { input.focus(); input.style.borderColor = '#e05c2a'; setTimeout(()=>{ input.style.borderColor = ''; }, 1500); }
    showSaveError('Please enter a session name before saving.');
    return;
  }
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  let history = loadHistory();
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  history = history.filter(s => new Date(s.date) >= cutoff);
  history.push({ date: todayISO(), name, players: active, games: state.games.length, bal: state.result.bal, txs: state.result.txs });
  saveHistory(history);
  const btn = document.querySelector('.rename-btn');
  if (btn) { btn.textContent = '✅ Saved!'; setTimeout(()=>{ btn.textContent = '💾 Save'; }, 1500); }
}
function showSaveError(msg) {
  const el = document.getElementById('saveError');
  if (el) { el.textContent = msg; el.style.display = 'block'; setTimeout(()=>{ el.style.display='none'; }, 2500); }
}
function newSession() {
  const saved = loadSavedPlayers();
  state.players = saved && saved.length >= 2 ? [...saved] : ['','',''];
  state.games=[]; state.result=null; state.sessionName=''; state.error=''; state.sessionTab='setup';
  render();
}
function toggleHist(i) { state.expandedHist = state.expandedHist === i ? null : i; render(); }
function deleteSession(i, e) {
  e.stopPropagation();
  const history = loadHistory(); history.splice(i,1); saveHistory(history);
  state.expandedHist = null; render();
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function bindEvents() {}

const _savedPlayers = loadSavedPlayers();
if (_savedPlayers && _savedPlayers.length >= 2) state.players = [..._savedPlayers];

render();
</script>
