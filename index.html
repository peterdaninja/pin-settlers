.app { display: flex; flex-direction: column; min-height: 100vh; }

<body>
<div class="app" id="app">
  <div class="header">
    <img src="logo.png" style="width:60px;height:60px;object-fit:contain;margin-bottom:4px;filter:drop-shadow(0 0 8px #f5c84260);border-radius:12px;" alt="Pin Settlers"/>
    <div class="header-title">Pin Settlers</div>
    <div class="header-sub">$5 per game · settle smart</div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
</div>

<script>
const COST = 5;

let state = {
  tab: 'session',
  sessionTab: 'setup',
  players: ['','',''],
  games: [],
  result: null,
  sessionName: '',
  error: '',
  expandedHist: null,
  adj: {
    hand: 'right',
    stance: '',
    target: '',
    entry: '',
    speed: '',
    reaction: '',   // 'early' | 'normal' | 'late'
    miss: '',       // 'brooklyn' | 'light-left' | 'light-right' | 'corner-left' | 'corner-right'
    result: null,
  },
};

const inputTimers = {};

/* ── Storage ── */
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('pinSettlers_history') || '[]'); }
  catch { return []; }
}
function saveHistory(h) { localStorage.setItem('pinSettlers_history', JSON.stringify(h)); }
function loadSavedPlayers() {
  try { return JSON.parse(localStorage.getItem('pinSettlers_players') || 'null'); }
  catch { return null; }
}
function savePlayers(p) { localStorage.setItem('pinSettlers_players', JSON.stringify(p)); }

/* ── Settlement math ── */
function computeBalances(players, games) {
  const bal = {};
  players.forEach(p => bal[p] = 0);
  for (const g of games) {
    const winners = g.winners;
    const losers = players.filter(p => !winners.includes(p));
    const pot = losers.length * COST;
    winners.forEach(w => bal[w] += pot / winners.length);
    losers.forEach(l => bal[l] -= COST);
  }
  return bal;
}
function settle(bal) {
  const cred = [], debt = [];
  for (const [n,b] of Object.entries(bal)) {
    if (b > 0.001) cred.push({name:n, amount:b});
    else if (b < -0.001) debt.push({name:n, amount:-b});
  }
  cred.sort((a,b) => b.amount - a.amount);
  debt.sort((a,b) => b.amount - a.amount);
  const txs = [];
  let i=0, j=0;
  while (i<cred.length && j<debt.length) {
    const c=cred[i], d=debt[j], amt=Math.min(c.amount, d.amount);
    txs.push({from:d.name, to:c.name, amount:amt});
    c.amount -= amt; d.amount -= amt;
    if (c.amount < 0.001) i++;
    if (d.amount < 0.001) j++;
  }
  return txs;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
}
function todayISO() { return new Date().toISOString().split('T')[0]; }

/* ══════════════════════════════════════════════
   ADJUSTMENT ENGINE
   ══════════════════════════════════════════════ */
function computeAdjustment(adj) {
  const hand = adj.hand;
  const stance = parseInt(adj.stance);
  const target = parseInt(adj.target);
  const entry  = parseInt(adj.entry);
  const speed  = parseFloat(adj.speed);
  const reaction = adj.reaction;
  const miss = adj.miss;

  // Pocket board: 17 for right-handed, 17 for left (mirrored, same number on their side)
  // For RH: higher board # = further left (toward gutter on left)
  // Board 17 = ideal entry for both hands on their respective sides
  const POCKET = 17;

  // Entry error: positive = hitting too far right (thin/light), negative = too far left (high/brooklyn)
  // RH: if entry < 17, hitting left (high/brooklyn); if entry > 17, hitting right (thin)
  // LH: mirrored
  let entryError = 0;
  if (hand === 'right') {
    entryError = entry - POCKET; // positive = right of pocket (light/thin), negative = left (high)
  } else {
    entryError = POCKET - entry; // mirrored for lefty
  }

  // Miss category analysis
  // brooklyn = went all the way left past headpin (RH) or right (LH) — entryError strongly negative
  // light-left = hit too far left, light (RH: high on headpin)
  // light-right = hit too far right, thin (RH)
  // corner-left = left corner pin (7 for RH) — ball crossed too far in
  // corner-right = right corner pin (10 for RH) — ball too far right/flat angle

  let missBoards = 0; // how many boards to move
  let missDir = ''; // 'left' or 'right' (in terms of feet/target movement)

  if (miss === 'brooklyn') {
    // Crossed headpin, went left — need to move right (for RH: move feet right, target right)
    missBoards = hand === 'right' ? Math.max(3, Math.abs(entryError)) : Math.max(3, Math.abs(entryError));
    missDir = hand === 'right' ? 'right' : 'left';
  } else if (miss === 'light-left') {
    // High on headpin / left side — move slightly right
    missBoards = Math.max(1, Math.round(Math.abs(entryError) * 0.7));
    missDir = hand === 'right' ? 'right' : 'left';
  } else if (miss === 'light-right') {
    // Thin on headpin / right side — move left
    missBoards = Math.max(1, Math.round(Math.abs(entryError) * 0.7));
    missDir = hand === 'right' ? 'left' : 'right';
  } else if (miss === 'corner-left') {
    // 7-pin for RH — ball went high/crossing, flat angle or too much hook
    missBoards = 2;
    missDir = hand === 'right' ? 'right' : 'left';
  } else if (miss === 'corner-right') {
    // 10-pin for RH — thin hit, need to move inside
    missBoards = 2;
    missDir = hand === 'right' ? 'left' : 'right';
  }

  // 2-1 rule: feet move 2x what target moves, same direction
  let feetMove = missBoards * 2;
  let targetMove = missBoards;

  // Ball reaction modifier
  // If hooking early: ball runs out of energy — target adjustment must compensate
  let reactionNote = '';
  let targetDepthCue = '';
  let shapeSeverity = '';

  if (reaction === 'early') {
    // Ball hooking too early = losing angle at breakpoint
    // Move target deeper (toward pins) by 1-2 boards AND reduce feet adjustment slightly
    targetDepthCue = `Also move your target 1–2 boards deeper (farther down the lane toward the pins). The ball is hooking before the breakpoint, burning up energy early — a deeper target gives it more room to travel before it turns.`;
    reactionNote = 'Early hook detected';
    shapeSeverity = 'moderate';
  } else if (reaction === 'late') {
    // Ball skidding too long = not enough friction, angle is flat
    targetDepthCue = `Also move your target 1–2 boards shallower (closer to the foul line). The ball is skidding past the breakpoint and arriving flat — a shallower target lets it pick up friction sooner and create a better angle.`;
    reactionNote = 'Late/skid detected';
    shapeSeverity = 'moderate';
  }

  // Speed analysis
  // Ideal stroker speed: ~16–18 mph. Below 15 = too slow (hooks too much), above 19 = too fast (skids)
  let speedNote = '';
  let speedCue = '';
  const SPEED_LOW = 15, SPEED_HIGH = 19;
  if (speed && speed < SPEED_LOW) {
    speedNote = `Speed low (${speed} mph)`;
    speedCue = `Your ball speed is on the slower side. This amplifies hook and can cause the ball to burn up early or drive through the nose. Try releasing 1–2 mph faster by pushing the ball out more on the pushaway, or shortening your backswing slightly.`;
  } else if (speed && speed > SPEED_HIGH) {
    speedNote = `Speed high (${speed} mph)`;
    speedCue = `Your ball speed is higher than typical for a stroker. The ball may be skidding too far and arriving with a flat angle. Try slowing your approach pace or letting the ball swing more freely rather than muscling it through.`;
  }

  // Entry angle diagnosis
  // We estimate angle from the differential between target board and entry board
  // Ideal entry angle ~4–5° for stroker. Rough proxy: (target - entry) differential
  // The bigger the board differential between target and entry, the steeper the angle
  let angleCue = '';
  const boardDiff = Math.abs(target - entry);
  if (boardDiff < 4) {
    angleCue = `Entry angle appears flat (ball traveled nearly straight from target to pocket). Consider opening your angle — move your feet 2–3 boards toward your ball side while keeping your target, creating more differential.`;
  } else if (boardDiff > 12) {
    angleCue = `Entry angle appears steep. The ball is crossing a lot of boards from target to entry. This can cause high hits or brooklyn misses. Consider closing your angle slightly — move your feet toward the outside while keeping target.`;
  }

  // Severity
  let severity = 'minor';
  if (missBoards >= 4 || miss === 'brooklyn') severity = 'major';
  else if (missBoards >= 2 || shapeSeverity === 'moderate') severity = 'moderate';

  // New stance and target (clamped 1–40)
  let newStance = stance, newTarget = target;
  if (missDir === 'left') {
    newStance = Math.max(1, Math.min(40, stance - feetMove));
    newTarget = Math.max(1, Math.min(40, target - targetMove));
  } else if (missDir === 'right') {
    newStance = Math.max(1, Math.min(40, stance + feetMove));
    newTarget = Math.max(1, Math.min(40, target + targetMove));
  }

  const dirLabel = missDir === 'left' ? '← Left' : '→ Right';
  const feetLabel = missDir === 'left' ? `${feetMove} boards left` : `${feetMove} boards right`;
  const targetLabel = missDir === 'left' ? `${targetMove} board${targetMove !== 1 ? 's' : ''} left` : `${targetMove} board${targetMove !== 1 ? 's' : ''} right`;

  return {
    severity,
    feetMove,
    targetMove,
    missDir,
    dirLabel,
    feetLabel,
    targetLabel,
    newStance,
    newTarget,
    targetDepthCue,
    reactionNote,
    speedNote,
    speedCue,
    angleCue,
    entryError,
    miss,
    hand,
    stance,
    target,
    entry,
    speed,
  };
}

/* ── Render ── */
function render() { renderTabs(); renderContent(); }

function renderTabs() {
  const tabs = document.getElementById('tabs');
  const items = [
    {id:'session', icon:'🎳', label:'Session'},
    {id:'adjust',  icon:'🎯', label:'Adjust'},
    {id:'history', icon:'📋', label:'History'},
  ];
  tabs.innerHTML = items.map(t => `
    <button class="tab ${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">
      <span class="tab-icon">${t.icon}</span>${t.label}
    </button>
  `).join('');
}

function renderContent() {
  const el = document.getElementById('content');
  if (state.tab === 'session') el.innerHTML = renderSession();
  else if (state.tab === 'adjust') el.innerHTML = renderAdjust();
  else el.innerHTML = renderHistory();
  bindEvents();
}

/* ── Session tab ── */
function renderSession() {
  const inner = state.sessionTab === 'setup'   ? renderSetup()
              : state.sessionTab === 'games'   ? renderGames()
              : renderResults();
  const subtabs = [
    {id:'setup',   icon:'👤', label:'Players'},
    {id:'games',   icon:'🎳', label:`Games${state.games.length?` (${state.games.length})`:''}`},
    {id:'results', icon:'💰', label:'Results'},
  ].map(t => `
    <button class="tab ${state.sessionTab===t.id?'active':''}" style="flex:1;font-size:0.58rem;"
      onclick="switchSessionTab('${t.id}')">
      <span class="tab-icon">${t.icon}</span>${t.label}
    </button>
  `).join('');
  return `
    <div style="display:flex;border-bottom:1px solid #2a2a4a;margin:-20px -16px 20px;background:#0d0d1a;">
      ${subtabs}
    </div>
    ${inner}
  `;
}

function renderSetup() {
  const rows = state.players.map((p,i) => `
    <div class="player-row">
      <input class="field" id="player-input-${i}" placeholder="Player ${i+1}" value="${esc(p)}"
        oninput="bufferPlayer(${i}, this.value)"
        autocapitalize="words" autocorrect="off" autocomplete="off" spellcheck="false"/>
      ${state.players.length > 2 ? `<button class="btn-sm" onclick="delPlayer(${i})">✕</button>` : ''}
    </div>
  `).join('');
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  return `
    <div class="sec-title">⚡ Players</div>
    ${rows}
    ${state.players.length < 4 ? `<button class="btn gap" onclick="addPlayer()">+ Add Player</button>` : ''}
    ${active.length >= 2 ? `
      <div style="margin-top:20px;">
        <button class="btn btn-primary" onclick="switchSessionTab('games')">Next → Add Games</button>
      </div>` : ''}
  `;
}

function renderGames() {
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  const gameCards = state.games.map((g,gi) => `
    <div class="card">
      <div class="card-head">
        <span class="card-label">Game ${gi+1}</span>
        <button class="btn btn-danger" onclick="delGame(${gi})">Remove</button>
      </div>
      <div class="card-body">
        <div style="font-size:0.6rem;color:#5050a0;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;">Tap winner(s)</div>
        ${active.map(p => {
          const isWinner = g.winners.includes(p);
          return `
            <button onclick="toggleWinner(${gi},'${esc(p)}')" style="
              display:flex;align-items:center;gap:10px;width:100%;
              background:${isWinner ? '#1a3a1a' : 'transparent'};
              border:1.5px solid ${isWinner ? 'var(--green)' : 'var(--border)'};
              border-radius:10px;padding:12px 14px;margin-bottom:8px;
              color:${isWinner ? 'var(--green)' : '#a0a0d0'};
              font-family:inherit;font-size:0.9rem;cursor:pointer;text-align:left;
            ">
              <span style="font-size:1.1rem;">${isWinner ? '🥇' : '○'}</span>
              <span>${esc(p)}</span>
              ${isWinner ? '<span style="margin-left:auto;font-size:0.65rem;letter-spacing:0.15em;">WINNER</span>' : ''}
            </button>
          `;
        }).join('')}
      </div>
      <div class="card-hint">Tap multiple players for a tie</div>
    </div>
  `).join('');
  return `
    <div class="sec-title">🎳 Game Results</div>
    ${gameCards}
    ${active.length >= 2
      ? `<button class="btn btn-ghost gap-lg" onclick="addGame()">+ Add Game</button>`
      : `<div class="empty">Go to Players tab first</div>`}
    ${state.games.length > 0 ? `
      <button class="btn btn-primary" onclick="calculate()">🎳 Settle Up</button>
      ${state.error ? `<div class="error">⚠ ${esc(state.error)}</div>` : ''}
    ` : ''}
  `;
}

function renderResults() {
  if (!state.result) return `<div class="empty">No results yet.<br/>Add games and tap<br/>🎳 <strong>Settle Up</strong></div>`;
  const {bal, txs} = state.result;
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  const balRows = active.map(n => {
    const b = bal[n] || 0;
    return `<div class="bal-row"><span>${esc(n)}</span><span class="${b>=0?'pos':'neg'}">${b>=0?'+':''}$${b.toFixed(2)}</span></div>`;
  }).join('');
  const txCards = txs.length === 0
    ? `<div class="all-clear">Everyone is square! 🎉</div>`
    : txs.map(tx => `
        <div class="tx-card">
          <span class="tx-from">${esc(tx.from)}</span>
          <span class="tx-arrow">→</span>
          <span class="tx-to">${esc(tx.to)}</span>
          <span class="tx-amt">$${tx.amount.toFixed(2)}</span>
        </div>
      `).join('');
  return `
    <div class="rename-row">
      <input class="field" id="sessionNameInput" placeholder="e.g. Friday Night Bowling"
        value="${esc(state.sessionName)}"
        oninput="bufferSessionName(this.value)"
        autocorrect="off" autocomplete="off" spellcheck="false"/>
      <button class="rename-btn" onclick="saveSession()">💾 Save</button>
    </div>
    <div id="saveError" class="error" style="display:none;margin-bottom:10px;"></div>
    <div class="sec-title" style="color:#f5c842;">💰 Net Balances · ${state.games.length} Game${state.games.length!==1?'s':''}</div>
    ${balRows}
    <div class="green-title" style="margin-top:20px;">✅ Pay Up · ${txs.length} Transaction${txs.length!==1?'s':''}</div>
    ${txCards}
    <div style="margin-top:24px;">
      <button class="btn btn-subtle" onclick="newSession()">🔄 New Session</button>
    </div>
  `;
}

function renderAdjResult(r) {
  const sevClass = r.severity === 'major' ? 'sev-major' : r.severity === 'moderate' ? 'sev-moderate' : 'sev-minor';
  const sevLabel = r.severity === 'major' ? 'Major adj' : r.severity === 'moderate' ? 'Moderate' : 'Minor adj';

  const noMove = r.feetMove === 0;

  // Lane visualization SVG
  // Simplified top-down lane showing boards, old line, new line
  const laneViz = buildLaneViz(r);

  return `
    <div class="adj-result">
      <div class="adj-result-head">
        <span style="font-size:1.4rem;">🎯</span>
        <span class="adj-result-title">Your Adjustment</span>
        <span class="adj-severity ${sevClass}">${sevLabel}</span>
      </div>

      ${laneViz}

      <div class="adj-block">
        <div class="adj-block-label">Feet (stance)</div>
        ${noMove ? `<div class="adj-move-detail">No lateral stance change needed</div>` : `
          <div class="adj-line">
            <span class="adj-move">${r.dirLabel}</span>
            <span class="adj-move-detail">${r.feetMove} boards → board ${r.newStance}</span>
          </div>
        `}
        <div class="adj-why">Move from board ${r.stance} to board ${r.newStance}. Your feet set the launch angle — moving them ${r.missDir} shifts your entire ball path in that direction.</div>
      </div>

      <div class="adj-block">
        <div class="adj-block-label">Target (arrows)</div>
        ${noMove ? `<div class="adj-move-detail">No target change needed</div>` : `
          <div class="adj-line">
            <span class="adj-move">${r.dirLabel}</span>
            <span class="adj-move-detail">${r.targetMove} board${r.targetMove!==1?'s':''} → board ${r.newTarget}</span>
          </div>
        `}
        <div class="adj-why">Move your target from board ${r.target} to board ${r.newTarget}. Using the 2-1 rule: feet move 2× what the target moves, both in the same direction as your miss.</div>
      </div>

      ${r.targetDepthCue ? `
        <div class="adj-block">
          <div class="adj-block-label">Ball shape fix</div>
          <div class="adj-cue">${r.targetDepthCue}</div>
        </div>
      ` : ''}

      ${r.speedCue ? `
        <div class="adj-block">
          <div class="adj-block-label">Speed note · ${esc(r.speedNote)}</div>
          <div class="adj-warn">${r.speedCue}</div>
        </div>
      ` : ''}

      ${r.angleCue ? `
        <div class="adj-block">
          <div class="adj-block-label">Entry angle</div>
          <div class="adj-cue">${r.angleCue}</div>
        </div>
      ` : ''}

      <div class="adj-block">
        <div class="adj-block-label">Summary</div>
        <div class="adj-cue" style="font-size:0.82rem;line-height:1.7;">
          ${buildSummary(r)}
        </div>
      </div>
    </div>
  `;
}

function buildSummary(r) {
  const hand = r.hand === 'right' ? 'right-handed' : 'left-handed';
  const pocket = 17;
  const diff = r.entry - pocket;
  const diffDesc = r.hand === 'right'
    ? (diff > 0 ? `${diff} board${Math.abs(diff)!==1?'s':''} right of pocket` : `${Math.abs(diff)} board${Math.abs(diff)!==1?'s':''} left of pocket`)
    : (diff < 0 ? `${Math.abs(diff)} board${Math.abs(diff)!==1?'s':''} right of pocket` : `${diff} board${Math.abs(diff)!==1?'s':''} left of pocket`);

  const missMap = {
    brooklyn: 'going Brooklyn',
    'light-left': 'hitting light-left',
    'light-right': 'hitting light-right',
    'corner-left': 'leaving the left corner pin',
    'corner-right': 'leaving the right corner pin',
  };

  return `You're ${hand}, playing board ${r.stance} at the line, targeting board ${r.target} at the arrows, and the ball is entering at board ${r.entry} — ${diffDesc}. You're consistently ${missMap[r.miss]||'missing'}. Move your feet ${r.feetMove} boards ${r.missDir} to board ${r.newStance} and your target ${r.targetMove} board${r.targetMove!==1?'s':''} ${r.missDir} to board ${r.newTarget}.`;
}

function buildLaneViz(r) {
  // Simplified lane top-down: foul line at top, pins at bottom
  // Show old line (orange) and new line (green)
  // Lane is 39 boards wide. We'll scale to fit SVG width.
  const W = 300, H = 140;
  const PAD = 16;
  const laneW = W - PAD * 2;
  const boardW = laneW / 39;

  // Convert board numbers to x positions (board 1 = right for RH, left for LH)
  // We'll display RH convention: board 1 on right, board 39 on left
  function boardX(b) {
    const clamped = Math.max(1, Math.min(39, b));
    return PAD + (39 - clamped) * boardW + boardW / 2;
  }

  // Old line: stance at top (foul line), entry at bottom (pocket)
  const oldStanceX = boardX(r.stance);
  const oldEntryX  = boardX(r.entry);
  // New line
  const newStanceX = boardX(r.newStance);
  const newEntryX  = boardX(17); // ideal pocket

  // Target markers (arrows area = ~30% down)
  const arrowY = H * 0.3;
  const oldTargetX = boardX(r.target);
  const newTargetX = boardX(r.newTarget);

  // Pin deck line at bottom
  const pinY = H - 18;
  const foulY = 18;

  return `
    <div class="lane-viz">
      <div class="lane-viz-label">Line visualization · top-down view</div>
      <div class="lane-svg-wrap">
        <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;">
          <!-- Lane background -->
          <rect x="${PAD}" y="${foulY}" width="${laneW}" height="${pinY - foulY}" fill="#0d1208" rx="2"/>
          <!-- Board lines every 5 boards -->
          ${[5,10,15,20,25,30,35].map(b => {
            const x = PAD + (39 - b) * boardW + boardW / 2;
            return `<line x1="${x}" y1="${foulY}" x2="${x}" y2="${pinY}" stroke="#1a2a10" stroke-width="0.5"/>
                    <text x="${x}" y="${foulY - 4}" text-anchor="middle" fill="#2a4a20" font-size="7" font-family="monospace">${b}</text>`;
          }).join('')}
          <!-- Arrows area line -->
          <line x1="${PAD}" y1="${arrowY}" x2="${PAD + laneW}" y2="${arrowY}" stroke="#2a3a20" stroke-width="0.5" stroke-dasharray="3 3"/>
          <text x="${PAD - 4}" y="${arrowY + 3}" text-anchor="end" fill="#2a4a20" font-size="7" font-family="monospace">▼</text>

          <!-- Foul line label -->
          <text x="${PAD - 4}" y="${foulY + 4}" text-anchor="end" fill="#3a3a6a" font-size="7" font-family="monospace">FL</text>
          <!-- Pin line label -->
          <text x="${PAD - 4}" y="${pinY + 4}" text-anchor="end" fill="#3a3a6a" font-size="7" font-family="monospace">↓</text>

          <!-- Old line (orange/miss) -->
          <line x1="${oldStanceX}" y1="${foulY}" x2="${oldTargetX}" y2="${arrowY}"
            stroke="#e05c2a" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
          <line x1="${oldTargetX}" y1="${arrowY}" x2="${oldEntryX}" y2="${pinY}"
            stroke="#e05c2a" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
          <circle cx="${oldEntryX}" cy="${pinY}" r="3" fill="#e05c2a" opacity="0.8"/>
          <text x="${oldEntryX}" y="${pinY + 11}" text-anchor="middle" fill="#e05c2a" font-size="7" font-family="monospace">${r.entry}</text>

          <!-- New line (green/target) -->
          <line x1="${newStanceX}" y1="${foulY}" x2="${newTargetX}" y2="${arrowY}"
            stroke="#4af04a" stroke-width="1.5" opacity="0.9"/>
          <line x1="${newTargetX}" y1="${arrowY}" x2="${newEntryX}" y2="${pinY}"
            stroke="#4af04a" stroke-width="1.5" opacity="0.9"/>
          <circle cx="${newEntryX}" cy="${pinY}" r="3" fill="#4af04a" opacity="0.9"/>
          <text x="${newEntryX}" y="${pinY + 11}" text-anchor="middle" fill="#4af04a" font-size="7" font-family="monospace">17</text>

          <!-- Stance markers at foul line -->
          <circle cx="${oldStanceX}" cy="${foulY}" r="3" fill="#e05c2a" opacity="0.7"/>
          <circle cx="${newStanceX}" cy="${foulY}" r="3" fill="#4af04a" opacity="0.9"/>

          <!-- Target markers at arrows -->
          <rect x="${oldTargetX - 3}" y="${arrowY - 4}" width="6" height="8" rx="1" fill="#e05c2a" opacity="0.6"/>
          <rect x="${newTargetX - 3}" y="${arrowY - 4}" width="6" height="8" rx="1" fill="#4af04a" opacity="0.8"/>

          <!-- Pin deck -->
          <line x1="${PAD}" y1="${pinY}" x2="${PAD + laneW}" y2="${pinY}" stroke="#2a4a2a" stroke-width="0.5"/>

          <!-- Legend -->
          <line x1="${W - 80}" y1="10" x2="${W - 65}" y2="10" stroke="#e05c2a" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.7"/>
          <text x="${W - 62}" y="13" fill="#e05c2a" font-size="7" font-family="monospace">current</text>
          <line x1="${W - 80}" y1="22" x2="${W - 65}" y2="22" stroke="#4af04a" stroke-width="1.5" opacity="0.9"/>
          <text x="${W - 62}" y="25" fill="#4af04a" font-size="7" font-family="monospace">adjusted</text>
        </svg>
      </div>
    </div>
  `;
}

/* ── History tab ── */
function renderHistory() {
  const history = loadHistory();
  if (history.length === 0) return `<div class="empty">No saved sessions yet.<br/>Complete a game, name it,<br/>and tap 💾 Save.</div>`;
  return `
    <div class="sec-title">📋 Past Sessions <span style="color:#3a3a7a;font-size:0.6em;letter-spacing:0.1em;">· last 30 days</span></div>
    ${history.slice().reverse().map((s,ri) => {
      const i = history.length - 1 - ri;
      const expanded = state.expandedHist === i;
      const txCount = s.txs.length;
      const label = s.name || formatDate(s.date);
      const detail = expanded ? `
        <div class="hist-body">
          <div style="font-size:0.65rem;color:#5050a0;letter-spacing:0.1em;margin-bottom:10px;">${formatDate(s.date)}</div>
          <div style="font-size:0.65rem;color:#6060a0;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:8px;">Balances</div>
          ${Object.entries(s.bal).map(([n,b])=>`
            <div class="bal-row" style="font-size:0.85rem;">
              <span>${esc(n)}</span>
              <span class="${b>=0?'pos':'neg'}">${b>=0?'+':''}$${b.toFixed(2)}</span>
            </div>
          `).join('')}
          <div style="font-size:0.65rem;color:#6060a0;letter-spacing:0.2em;text-transform:uppercase;margin:14px 0 8px;">Transactions</div>
          ${s.txs.length === 0
            ? `<div style="color:#4af04a;font-size:0.85rem;padding:8px 0;">Everyone was square 🎉</div>`
            : s.txs.map(tx=>`
                <div class="tx-card" style="font-size:0.85rem;padding:10px 14px;">
                  <span class="tx-from">${esc(tx.from)}</span>
                  <span class="tx-arrow" style="font-size:1rem;">→</span>
                  <span class="tx-to">${esc(tx.to)}</span>
                  <span class="tx-amt" style="font-size:0.95rem;">$${tx.amount.toFixed(2)}</span>
                </div>
              `).join('')}
          <div style="margin-top:14px;">
            <button class="btn btn-danger" style="width:100%;padding:10px;" onclick="deleteSession(${i},event)">🗑 Delete This Session</button>
          </div>
        </div>
      ` : '';
      return `
        <div class="hist-card" onclick="toggleHist(${i})">
          <div class="hist-head">
            <div>
              <div class="hist-date">${esc(label)}</div>
              <div class="hist-meta">${s.games} game${s.games!==1?'s':''} · ${s.players.join(', ')}</div>
            </div>
            <div class="hist-right">
              <div style="text-align:right;">
                <div style="font-size:0.7rem;color:#5050a0;">${txCount} tx</div>
              </div>
              <span class="hist-chevron ${expanded?'open':''}">▶</span>
            </div>
          </div>
          ${detail}
        </div>
      `;
    }).join('')}
  `;
}

/* ── Adjust actions ── */
function adjSlider(key, val) {
  const v = parseFloat(val);
  state.adj[key] = v;
  state.adj[key + 'Touched'] = true;
  state.adj.result = null;
  // Live-update label and fill bar without full re-render
  const lbl = document.getElementById('lbl-' + key);
  const fill = document.getElementById('fill-' + key);
  if (lbl) {
    lbl.textContent = key === 'speed' ? v + ' mph' : v;
    lbl.classList.remove('unset');
  }
  if (fill) {
    const pct = key === 'speed'
      ? ((v - 8) / 17 * 100).toFixed(1)
      : ((v - 1) / 38 * 100).toFixed(1);
    fill.style.width = pct + '%';
  }
  // Check if we can now enable the button (no re-render needed for sliders)
  updateCalcBtn();
}
function updateCalcBtn() {
  const a = state.adj;
  const can = a.stanceTouched && a.targetTouched && a.entryTouched && a.speedTouched && a.reaction && a.miss;
  const btn = document.getElementById('calc-btn');
  if (btn) {
    btn.style.opacity = can ? '1' : '0.4';
    btn.style.pointerEvents = can ? 'auto' : 'none';
  }
}
function adjSet(key, val) {
  state.adj[key] = val;
  state.adj.result = null;
  render();
  // After render, re-check button state
  setTimeout(updateCalcBtn, 0);
}
function adjSetVal(key, val) {
  state.adj[key] = val;
  state.adj.result = null;
  // Debounce re-render for number inputs
  clearTimeout(inputTimers['adj_' + key]);
  inputTimers['adj_' + key] = setTimeout(() => { render(); }, 400);
}
function runAdjustment() {
  const a = state.adj;
  if (!a.stance || !a.target || !a.entry || !a.speed || !a.reaction || !a.miss) return;
  state.adj.result = computeAdjustment(a);
  render();
  // Scroll to result
  setTimeout(() => {
    const el = document.querySelector('.adj-result');
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 100);
}
function resetAdj() {
  state.adj = { hand: state.adj.hand, stance:'', target:'', entry:'', speed:'',
    stanceTouched:false, targetTouched:false, entryTouched:false, speedTouched:false,
    reaction:'', miss:'', result:null };
  render();
}

/* ── Session actions ── */
function bufferPlayer(i, val) {
  state.players[i] = val;
  clearTimeout(inputTimers['player_' + i]);
  inputTimers['player_' + i] = setTimeout(() => {
    state.result = null;
    render();
    const el = document.getElementById('player-input-' + i);
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 600);
}
function bufferSessionName(val) { state.sessionName = val; }

function switchTab(t) { state.tab = t; state.expandedHist = null; render(); }
function switchSessionTab(t) {
  Object.keys(inputTimers).forEach(k => { clearTimeout(inputTimers[k]); delete inputTimers[k]; });
  state.sessionTab = t;
  render();
}

function addPlayer() {
  if (state.players.length < 4) {
    state.players.push('');
    render();
    setTimeout(() => {
      const el = document.getElementById('player-input-' + (state.players.length - 1));
      if (el) el.focus();
    }, 50);
  }
}
function delPlayer(i) {
  if (state.players.length <= 2) return;
  state.players.splice(i,1); state.games=[]; state.result=null; render();
}
function addGame() {
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  if (active.length < 2) return;
  state.games.push({ winners: [] }); state.result = null; render();
}
function toggleWinner(gi, player) {
  const w = state.games[gi].winners;
  const idx = w.indexOf(player);
  if (idx === -1) w.push(player); else w.splice(idx, 1);
  state.result = null; render();
}
function delGame(i) { state.games.splice(i,1); state.result=null; render(); }

function calculate() {
  state.error = '';
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  if (active.length < 2) { state.error = 'Enter at least 2 player names.'; render(); return; }
  if (state.games.length === 0) { state.error = 'Add at least one game.'; render(); return; }
  for (let i = 0; i < state.games.length; i++) {
    if (state.games[i].winners.length === 0) { state.error = `Game ${i+1} needs at least one winner.`; render(); return; }
    if (state.games[i].winners.length === active.length) { state.error = `Game ${i+1}: everyone can't win.`; render(); return; }
  }
  savePlayers(active);
  const bal = computeBalances(active, state.games);
  state.result = {bal, txs: settle(bal)};
  state.sessionTab = 'results';
  render();
}

function saveSession() {
  if (!state.result) return;
  const input = document.getElementById('sessionNameInput');
  if (input) state.sessionName = input.value;
  const name = state.sessionName.trim();
  if (!name) {
    if (input) { input.focus(); input.style.borderColor = '#e05c2a'; setTimeout(()=>{ input.style.borderColor = ''; }, 1500); }
    showSaveError('Please enter a session name before saving.');
    return;
  }
  const active = state.players.map(p=>p.trim()).filter(Boolean);
  let history = loadHistory();
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
  history = history.filter(s => new Date(s.date) >= cutoff);
  history.push({ date: todayISO(), name, players: active, games: state.games.length, bal: state.result.bal, txs: state.result.txs });
  saveHistory(history);
  const btn = document.querySelector('.rename-btn');
  if (btn) { btn.textContent = '✅ Saved!'; setTimeout(()=>{ btn.textContent = '💾 Save'; }, 1500); }
}
function showSaveError(msg) {
  const el = document.getElementById('saveError');
  if (el) { el.textContent = msg; el.style.display = 'block'; setTimeout(()=>{ el.style.display='none'; }, 2500); }
}
function newSession() {
  const saved = loadSavedPlayers();
  state.players = saved && saved.length >= 2 ? [...saved] : ['','',''];
  state.games=[]; state.result=null; state.sessionName=''; state.error=''; state.sessionTab='setup';
  render();
}
function toggleHist(i) { state.expandedHist = state.expandedHist === i ? null : i; render(); }
function deleteSession(i, e) {
  e.stopPropagation();
  const history = loadHistory(); history.splice(i,1); saveHistory(history);
  state.expandedHist = null; render();
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function bindEvents() {}

const _savedPlayers = loadSavedPlayers();
if (_savedPlayers && _savedPlayers.length >= 2) state.players = [..._savedPlayers];

render();
</script>
